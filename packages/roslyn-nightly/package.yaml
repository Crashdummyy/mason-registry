---
name: roslyn-nightly
description: |
  The Roslyn .NET compiler provides C# and Visual Basic languages with rich code analysis APIs.
  This version tracks the latest updates on azure.
  https://dev.azure.com/azure-public/vside/_artifacts/feed/vs-impl/NuGet/roslyn-language-server.linux-x64
homepage: https://github.com/dotnet/roslyn
licenses:
  - MIT
languages:
  - C#
categories:
  - LSP
source:
  id: pkg:github/Crashdummyy/roslynLanguageServer@5.9.0-1.26313.1
  asset:
    - target: darwin_x64
      file: microsoft.codeanalysis.languageserver.osx-x64.zip:libexec/
      bin: libexec/Microsoft.CodeAnalysis.LanguageServer
    - target: darwin_arm64
      file: microsoft.codeanalysis.languageserver.osx-arm64.zip:libexec/
      bin: libexec/Microsoft.CodeAnalysis.LanguageServer
    - target: linux_x64
      file: microsoft.codeanalysis.languageserver.linux-x64.zip:libexec/
      bin: libexec/Microsoft.CodeAnalysis.LanguageServer
    - target: linux_arm64
      file: microsoft.codeanalysis.languageserver.linux-arm64.zip:libexec/
      bin: libexec/Microsoft.CodeAnalysis.LanguageServer
    - target: win_x64
      file: microsoft.codeanalysis.languageserver.win-x64.zip:libexec/
      bin: libexec/Microsoft.CodeAnalysis.LanguageServer.exe
    - target: win_arm64
      file: microsoft.codeanalysis.languageserver.win-arm64.zip:libexec/
      bin: libexec/Microsoft.CodeAnalysis.LanguageServer.exe

bin:
  roslyn: dotnet:libexec/Microsoft.CodeAnalysis.LanguageServer.dll
  roslyn-language-server: "{{source.asset.bin}}"
